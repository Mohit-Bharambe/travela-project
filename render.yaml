# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy with: Connect your GitHub repo on Render Dashboard

services:
  # ─── Django Backend (Web Service) ───
  - type: web
    name: travela-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn MiProject.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: travela-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.3"

databases:
  - name: travela-db
    plan: free
    region: oregon
